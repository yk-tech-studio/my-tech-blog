<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep navy background -->
  <circle cx="16" cy="16" r="16" fill="#0d1b3e"/>

  <!-- Stars -->
  <circle cx="5" cy="6" r="0.8" fill="rgba(255,255,255,0.7)"/>
  <circle cx="27" cy="9" r="0.6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="25" cy="25" r="0.7" fill="rgba(255,255,255,0.5)"/>
  <circle cx="4" cy="24" r="0.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="11" cy="4" r="0.5" fill="rgba(255,255,255,0.5)"/>

  <!-- Satellite body (tilted 45deg) -->
  <g transform="translate(16,16) rotate(-45)">
    <!-- Main body -->
    <rect x="-3" y="-3.5" width="6" height="7" rx="1" fill="#c9a227"/>
    <!-- Solar panel left -->
    <rect x="-9" y="-1.5" width="5.5" height="3" rx="0.5" fill="#2a5fa0"/>
    <line x1="-9" y1="0" x2="-3.5" y2="0" stroke="#1a3f70" stroke-width="0.4"/>
    <!-- Solar panel right -->
    <rect x="3.5" y="-1.5" width="5.5" height="3" rx="0.5" fill="#2a5fa0"/>
    <line x1="3.5" y1="0" x2="9" y2="0" stroke="#1a3f70" stroke-width="0.4"/>
    <!-- Antenna -->
    <line x1="0" y1="-3.5" x2="0" y2="-6.5" stroke="#e8c547" stroke-width="1"/>
    <circle cx="0" cy="-7" r="1.2" fill="none" stroke="#e8c547" stroke-width="0.8"/>
    <!-- Body highlight -->
    <rect x="-1.5" y="-2.5" width="2" height="5" rx="0.3" fill="rgba(255,255,255,0.15)"/>
  </g>
</svg>
