<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="16" fill="#0b0f1a"/>

  <!-- パラボラ皿 -->
  <path d="M20 70 Q50 20 80 70"
        fill="none"
        stroke="#58a6ff"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- 支柱 -->
  <line x1="50" y1="60" x2="50" y2="80"
        stroke="#58a6ff"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- フィード -->
  <circle cx="50" cy="60" r="4" fill="#58a6ff"/>

  <!-- 電波 -->
  <path d="M60 35 Q70 30 80 35"
        fill="none"
        stroke="#58a6ff"
