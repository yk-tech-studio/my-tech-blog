<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <circle cx="50" cy="50" r="50" fill="#0b0f1a"/>

  <!-- パラボラ（角度強め） -->
  <ellipse cx="48" cy="55" rx="28" ry="16"
           fill="none"
           stroke="#58a6ff"
           stroke-width="6"
           transform="rotate(-35 48 55)"/>

  <!-- 支柱 -->
  <line x1="48" y1="55" x2="62" y2="38"
        stroke="#58a6ff"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- フィード -->
  <circle cx="62" cy="38" r="4" fill="#58a6ff"/>

  <!-- 電波（少しだけ強調） -->
  <path d="M68 28 Q80 22 92 28"
        fill="none"
        stroke="#58a6ff"
        stroke-width="3"
        stroke-linecap="round"/>

  <path d="M70 20 Q85 12 98 20"
        fill="none"
        stroke="#58a6ff"
        stroke-width="2.5"
        stroke-linecap="round"/>
</svg>
